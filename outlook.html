<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bandeja de entrada - Outlook Express</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Tahoma', sans-serif;
            background-color: #ECE9D8;
            overflow: hidden;
        }

        /* --- ESTRUCTURA PRINCIPAL --- */
        .outlook-container {
            display: flex; flex-direction: column; height: 100vh;
            border: 2px solid #0058EE;
        }

        /* Barra de Herramientas Superior */
        .toolbar {
            background: #F1F0E7; padding: 5px;
            display: flex; gap: 10px; border-bottom: 1px solid #919B9C;
        }
        .tool-btn {
            display: flex; flex-direction: column; align-items: center;
            font-size: 11px; padding: 5px 10px; cursor: pointer;
        }
        .tool-btn:hover { background: #E5E2D1; border: 1px solid #919B9C; border-radius: 3px; }

        /* Cuerpo del programa */
        .main-view { display: flex; flex: 1; overflow: hidden; }

        /* Panel Lateral (Carpetas) */
        .folder-pane {
            width: 200px; background: #FFF; border-right: 1px solid #919B9C;
            font-size: 12px; padding: 10px;
        }
        .folder-item { padding: 3px 5px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .folder-item.selected { background: #316AC5; color: #FFF; }
        .folder-item:hover:not(.selected) { background: #E5E2D1; }

        /* Lado Derecho: Lista y Contenido */
        .content-pane { display: flex; flex-direction: column; flex: 1; }

        /* Lista de Mensajes */
        .message-list {
            height: 35%; background: #FFF; border-bottom: 2px solid #919B9C;
            overflow-y: scroll; font-size: 11px;
        }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { 
            background: #ECE9D8; position: sticky; top: 0; 
            border: 1px solid #919B9C; padding: 3px; text-align: left; font-weight: normal;
        }
        td { padding: 4px; border-bottom: 1px dotted #CCC; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        tr.selected { background: #316AC5; color: #FFF !important; }
        tr.unread { font-weight: bold; }

        /* Previsualización del Mensaje */
        .message-view {
            flex: 1; background: #FFF; padding: 15px; overflow-y: auto;
            border-top: 1px solid #919B9C;
        }
        .msg-header { background: #F1F0E7; padding: 10px; border: 1px solid #919B9C; margin-bottom: 15px; font-size: 12px; }
        .msg-header div { margin-bottom: 4px; }
        .msg-body { font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.4; white-space: pre-wrap; color: #000; }
        
        .label { font-weight: bold; color: #666; width: 60px; display: inline-block; }
    </style>
</head>
<body>

<div class="outlook-container">
    <div class="toolbar">
        <div class="tool-btn"><span>📧</span><span>Crear correo</span></div>
        <div class="tool-btn"><span>📥</span><span>Recibir</span></div>
        <div class="tool-btn"><span>📁</span><span>Carpetas</span></div>
        <div class="tool-btn"><span>🖨️</span><span>Imprimir</span></div>
    </div>

    <div class="main-view">
        <div class="folder-pane">
            <strong>Outlook Express</strong>
            <div class="folder-item">📂 Carpetas locales</div>
            <div class="folder-item selected" id="folder-inbox" onclick="renderList('inbox')">  📥 Bandeja de entrada</div>
            <div class="folder-item">  📤 Bandeja de salida</div>
            <div class="folder-item">  📝 Elementos enviados</div>
            <div class="folder-item">  🗑️ Elementos eliminados</div>
            <div class="folder-item" id="folder-drafts" onclick="renderList('drafts')">  📄 Borradores</div>
        </div>

        <div class="content-pane">
            <div class="message-list">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 20px;">!</th>
                            <th style="width: 30%;">De</th>
                            <th style="width: 45%;">Asunto</th>
                            <th style="width: 25%;">Recibido</th>
                        </tr>
                    </thead>
                    <tbody id="msg-list-body">
                        </tbody>
                </table>
            </div>

            <div class="message-view" id="message-display">
                <div id="welcome-msg" style="text-align: center; color: #999; margin-top: 50px;">
                    Seleccione un mensaje para verlo.
                </div>
                <div id="msg-content" style="display:none;">
                    <div class="msg-header">
                        <div><span class="label">De:</span> <span id="view-from"></span></div>
                        <div><span class="label">Para:</span> <span id="view-to"></span></div>
                        <div><span class="label">Fecha:</span> <span id="view-date"></span></div>
                        <div><span class="label">Asunto:</span> <span id="view-subject"></span></div>
                    </div>
                    <div class="msg-body" id="view-body"></div>
                </div>
            </div>
        </div>
    </div>
</div>

    const drafts = [
        {
            from: "sofia.cuervo@vinedoscuervo.es",
            to: "[sin destinatario]",

    const listBody = document.getElementById('msg-list-body');
    const msgContent = document.getElementById('msg-content');
    const welcomeMsg = document.getElementById('welcome-msg');

    function renderList(folder) {
        // UI de carpetas
        document.querySelectorAll('.folder-item').forEach(f => f.classList.remove('selected'));
        if(folder === 'inbox') document.getElementById('folder-inbox').classList.add('selected');
        if(folder === 'drafts') document.getElementById('folder-drafts').classList.add('selected');

        // Limpiar lista y vista
        listBody.innerHTML = '';
        welcomeMsg.style.display = 'block';
        msgContent.style.display = 'none';

        const data = (folder === 'inbox') ? emails : drafts;

        data.forEach((email, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td></td>
                <td>${email.from}</td>
                <td>${email.subject}</td>
                <td>${email.date.split(',')[1] || email.date}</td>
            `;
            tr.onclick = () => selectEmail(index, tr, data);
            listBody.appendChild(tr);
        });
    }

    function selectEmail(index, element, dataSource) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
        element.classList.add('selected');
        
        const mail = dataSource[index];
        welcomeMsg.style.display = 'none';
        msgContent.style.display = 'block';
        
        document.getElementById('view-from').innerText = mail.from;
        document.getElementById('view-to').innerText = mail.to;
        document.getElementById('view-date').innerText = mail.date;
        document.getElementById('view-subject').innerText = mail.subject;
        document.getElementById('view-body').innerText = mail.body;
    }

    // Inicializar
    window.onload = () => renderList('inbox');
</script>
